name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------- #
  #  Build + unit tests + integration tests (fast, most coverage)   #
  # --------------------------------------------------------------- #
  test:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - label: linux-x64-cpu
            runner: ubuntu-latest
            backend: cpu
            run_integration: true
          - label: linux-x64-cuda
            runner: ubuntu-latest
            backend: cuda
            run_integration: true
          # Windows x86_64
          - label: windows-x64-cpu
            runner: windows-2022
            backend: cpu
            run_integration: true
          - label: windows-x64-cuda
            runner: windows-2022
            backend: cuda
            run_integration: false       # hosted Windows = no NVIDIA GPU
          - label: windows-x64-vulkan
            runner: windows-2022
            backend: vulkan
            run_integration: false       # hosted Windows = no Vulkan GPU
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Model cache (shared across platforms) ----
      # The integration tests assert on visible content ("pong", French reply,
      # streamed deltas). Qwen3-family models think by default: a small model
      # spends the whole max_tokens budget inside <think>, everything routes to
      # reasoning_content, and content-asserting tests fail. Use the
      # non-thinking instruct model the suite was written for.
      - name: Cache test model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: qwen2.5-0.5b-instruct-q4_k_m.gguf
          key: qwen2.5-0.5b-instruct-q4_k_m-gguf

      - name: Download test model
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -fsSL \
            -o qwen2.5-0.5b-instruct-q4_k_m.gguf \
            "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf?download=true"

      - name: Cache embedding model download
        id: embed-model-cache
        uses: actions/cache@v4
        with:
          path: nomic-embed-text-v1.5.Q8_0.gguf
          key: nomic-embed-text-v1.5-q8_0-gguf

      - name: Download embedding test model
        if: steps.embed-model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -fsSL \
            -o nomic-embed-text-v1.5.Q8_0.gguf \
            "https://huggingface.co/nomic-ai/nomic-embed-text-v1.5-GGUF/resolve/main/nomic-embed-text-v1.5.Q8_0.gguf?download=true"

      # ---- Backend-specific prerequisites ----
      - name: Install CUDA Toolkit (Linux, CUDA backend)
        if: matrix.backend == 'cuda' && runner.os == 'Linux'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -q
          sudo apt-get install -y cuda-toolkit-12-6
          # Hosted runners have no NVIDIA driver, so nothing provides
          # libcuda.so.1 — which gtest_discover_tests needs just to load the
          # test binary at build time. The toolkit's stub satisfies the loader;
          # CUDA init then fails at runtime and helix falls back to CPU.
          sudo ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/local/cuda/lib64/stubs:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      - name: Install CUDA Toolkit (Windows, CUDA backend)
        if: matrix.backend == 'cuda' && runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.6.2'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cudart_dev", "cublas", "cublas_dev", "visual_studio_integration"]'
      # ggml-vulkan does find_package(SPIRV-Headers) via $ENV{VULKAN_SDK}; the
      # full LunarG SDK ships that CMake package (the humbletim action's
      # minimal install does not). Mirrors llama.cpp's own release workflow.
      - name: Install Vulkan SDK (Windows, Vulkan backend)
        if: matrix.backend == 'vulkan' && runner.os == 'Windows'
        shell: pwsh
        env:
          VULKAN_VERSION: 1.4.313.2
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      # ---- Configure ----
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -DHELIX_BACKEND=${{ matrix.backend }} \
            -DHELIX_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 ^
            -DHELIX_BACKEND=${{ matrix.backend }} -DHELIX_BUILD_TESTS=ON ^
            -DCMAKE_BUILD_TYPE=Release
        shell: cmd

      # ---- Build ----
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel $(nproc)
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel
        shell: cmd

      # ---- Unit tests ----
      - name: Unit tests (Linux)
        if: runner.os == 'Linux'
        run: |
          ctest --test-dir build \
            --output-on-failure \
            --output-junit build/test-results.xml
        env:
          HELIX_BACKEND_CPU: "1"
      - name: Unit tests (Windows)
        if: runner.os == 'Windows'
        run: |
          ctest --test-dir build -C Release --output-on-failure
        shell: cmd

      # ---- Integration tests ----
      - name: Integration tests (Linux)
        if: matrix.run_integration && runner.os == 'Linux'
        run: |
          ./build/tests/helix_integration_tests
        env:
          HELIX_TEST_MODEL: "${{ github.workspace }}/qwen2.5-0.5b-instruct-q4_k_m.gguf"
          HELIX_TEST_EMBED_MODEL: "${{ github.workspace }}/nomic-embed-text-v1.5.Q8_0.gguf"
      - name: Integration tests (Windows)
        if: matrix.run_integration && runner.os == 'Windows'
        run: |
          .\build\bin\Release\helix_integration_tests.exe
        shell: cmd
        env:
          HELIX_TEST_MODEL: '${{ github.workspace }}\qwen2.5-0.5b-instruct-q4_k_m.gguf'
          HELIX_TEST_EMBED_MODEL: '${{ github.workspace }}\nomic-embed-text-v1.5.Q8_0.gguf'

      - name: Upload test results
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.label }}
          path: build/test-results.xml
          retention-days: 30