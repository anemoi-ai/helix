site_name: Helix
site_description: OpenAI-isomorphic on-device LLM library
repo_url: https://github.com/anemoi-ai/helix
repo_name: anemoi-ai/helix
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Get Started:
    - Installation: install.md
    - User Guide: USER_GUIDE.md
  - API Reference:
    - C API (helix.h): api-reference.md
  - Wrappers: wrappers/index.md
  - Benchmarks: benchmarks.md
  - Project:
    - ABI Policy: abi-policy.md
    - CI & Build Infrastructure: ci-build-setup.md
    - llama.cpp Update Guide: llama-cpp-update-guide.md
    - Migration (0.8 → 1.0): migration/0.8-to-1.0.md
